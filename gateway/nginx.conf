 events {}

http {
  # Upstreams — nombres exactos del docker-compose
  upstream create-startup   { server create-startup:3001; }
  upstream read-startup     { server read-startup:3002; }
  upstream update-startup   { server update-startup:3003; }
  upstream delete-startup   { server delete-startup:3004; }
  upstream create-technology { server create-technology:3005; }
  upstream read-technology  { server read-technology:3006; }
  upstream update-technology { server update-technology:3007; }
  upstream delete-technology { server delete-technology:3008; }

  server {
    listen 80;

    # CORS global
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    # Preflight OPTIONS
    if ($request_method = OPTIONS) {
      return 204;
    }

    # Status del gateway
    location /status {
      return 200 '{"status":"gateway ok"}';
      add_header Content-Type application/json;
    }

    # ── Startups ──
    location /v1/api/startups/create {
      proxy_pass http://create-startup/;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location /v1/api/startups/read {
      proxy_pass http://read-startup/;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location ~ ^/v1/api/startups/read/(.+)$ {
      proxy_pass http://read-startup/$1;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location ~ ^/v1/api/startups/update/(.+)$ {
      proxy_pass http://update-startup/$1;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location ~ ^/v1/api/startups/delete/(.+)$ {
      proxy_pass http://delete-startup/$1;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }

    # ── Technologies ──
    location /v1/api/technologies/create {
      proxy_pass http://create-technology/;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location /v1/api/technologies/read {
      proxy_pass http://read-technology/;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location ~ ^/v1/api/technologies/read/(.+)$ {
      proxy_pass http://read-technology/$1;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location ~ ^/v1/api/technologies/update/(.+)$ {
      proxy_pass http://update-technology/$1;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }
    location ~ ^/v1/api/technologies/delete/(.+)$ {
      proxy_pass http://delete-technology/$1;
      proxy_set_header Host $host;
      proxy_read_timeout 30s;
    }

    # Servir el frontend compilado
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
